name: Generate Stats

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4   # ✅ updated

      - name: Setup Python
        uses: actions/setup-python@v5   # ✅ updated
        with:
          python-version: 3.11

      - name: Install requests
        run: pip install requests

      - name: Run script
        run: python generate_stats.py

      - name: Commit file
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add stats.svg
          git commit -m "update stats" || echo "no changes"
          git push
