name: Generate Pac-Man Animation

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Pac-Man
        uses: hugoalh/github-contribution-svg-pacman@v0.3.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          github_username: ${{ github.repository_owner }}
          output_path: dist/github-contribution-grid-pacman.svg

      - name: Push to output branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: output
          publish_dir: dist
          force_orphan: true
